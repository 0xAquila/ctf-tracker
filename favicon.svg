<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background: accent blue, rounded corners matching nav-logo border-radius -->
  <rect width="32" height="32" rx="7" fill="#5b8def"/>
  <!-- Lightning bolt — same polyline as nav logo, scaled to 32x32 grid with 4px padding -->
  <!-- Original viewBox 0 0 24 24 → scaled by 1.0 with +4 offset to center in 32px -->
  <polyline
    points="17 6 7 18 16 18 15 26 25 14 16 14 17 6"
    fill="none"
    stroke="#ffffff"
    stroke-width="2.2"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
